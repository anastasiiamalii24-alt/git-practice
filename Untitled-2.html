<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heart Text</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* КОНТЕЙНЕР */
.heart {
    position: relative;
    width: 300px;
    height: 300px;
    transform: rotate(-45deg);
    animation: rotate 10s linear infinite;
}

/* САМО СЕРЦЕ */
.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: transparent;
    border-radius: 50%;
    box-shadow: 0 0 30px red;
}

.heart::before {
    top: -150px;
}

.heart::after {
    left: 150px;
}

/* ТЕКСТ */
.text {
    position: absolute;
    width: 100%;
    height: 100%;
    color: red;
    font-size: 18px;
    text-align: center;
    animation: float 4s ease-in-out infinite;
}

/* АНІМАЦІЯ */
@keyframes rotate {
    from { transform: rotate(-45deg) rotate(0deg); }
    to { transform: rotate(-45deg) rotate(360deg); }
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
</style>
</head>

<body>

<div class="heart">
    <div class="text">
        I LOVE YOU ❤️<br>
        I LOVE YOU ❤️<br>
        I LOVE YOU ❤️<br>
        I LOVE YOU ❤️<br>
        I LOVE YOU ❤️
    </div>
</div>

</body>
</html>
